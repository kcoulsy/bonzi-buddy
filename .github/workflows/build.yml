name: Build standalone binaries

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write # needed to attach binaries to a Release on tag

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x86_64
          - os: windows-latest
            name: windows-x64
          - os: macos-latest
            name: macos-arm64
          - os: macos-13
            name: macos-x64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Qt needs a few system libs present so PyInstaller can discover/bundle them.
      - name: Install Qt runtime deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxcb-cursor0 libxkbcommon0 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 \
            libxcb-render-util0 libxcb-shape0 libxcb-xinerama0

      - name: Install build deps
        run: python -m pip install --upgrade pip pyinstaller PySide6 numpy pillow

      - name: Build
        run: pyinstaller --clean --noconfirm packaging/bonzi.spec

      # --- package into a plain archive: unzip and run, no installer ---
      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          cp README.md dist/ || true
          tar -C dist -czf "bonzi-${{ matrix.name }}.tar.gz" bonzi README.md
      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          cd dist
          zip -r -y "../bonzi-${{ matrix.name }}.zip" Bonzi.app bonzi
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist/bonzi.exe, README.md -DestinationPath "bonzi-${{ matrix.name }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bonzi-${{ matrix.name }}
          path: |
            bonzi-${{ matrix.name }}.tar.gz
            bonzi-${{ matrix.name }}.zip
          if-no-files-found: error

  release:
    name: Attach to release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
          generate_release_notes: true
