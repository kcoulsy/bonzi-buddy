name: Build standalone binaries

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write # needed to commit releases and publish release assets

jobs:
  prepare-release:
    name: Bump release version
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.version.outputs.ref }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump patch version
        id: version
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          version=$(python - <<'PY'
          from pathlib import Path
          import re

          path = Path("pyproject.toml")
          text = path.read_text()
          match = re.search(r'^version = "(\d+)\.(\d+)\.(\d+)"$', text, re.MULTILINE)
          if not match:
              raise SystemExit("Could not find a semantic project version")

          major, minor, patch = map(int, match.groups())
          next_version = f"{major}.{minor}.{patch + 1}"
          path.write_text(text[:match.start(1)] + next_version + text[match.end(1):])
          print(next_version)
          PY
          )
          tag="v$version"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          git commit -m "chore: release $tag"
          git push origin HEAD:main
          printf 'ref=%s\n' "$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          printf 'tag=%s\n' "$tag" >> "$GITHUB_OUTPUT"

  build:
    name: Build (${{ matrix.name }})
    needs: prepare-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x86_64
          - os: windows-latest
            name: windows-x64
          - os: macos-latest
            name: macos-arm64
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.ref || github.sha }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12.10"

      # Qt needs a few system libs present so PyInstaller can discover/bundle them.
      - name: Install Qt runtime deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxcb-cursor0 libxkbcommon0 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 \
            libxcb-render-util0 libxcb-shape0 libxcb-xinerama0

      - name: Install build deps
        run: python -m pip install --only-binary=:all: -r requirements-build.txt

      - name: Build
        run: pyinstaller --clean --noconfirm packaging/bonzi.spec

      # Keep this alongside the release one-file build until the startup issue
      # has been verified on a clean Windows 11 machine.
      - name: Build one-dir diagnostic (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:BONZI_BUILD_MODE = "onedir"
          pyinstaller --clean --noconfirm packaging/bonzi.spec

      # --- package into a plain archive: unzip and run, no installer ---
      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          cp README.md dist/ || true
          tar -C dist -czf "bonzi-${{ matrix.name }}.tar.gz" bonzi README.md
      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          cd dist
          zip -r -y "../bonzi-${{ matrix.name }}.zip" Bonzi.app bonzi
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path dist/bonzi.exe, README.md -DestinationPath "bonzi-${{ matrix.name }}.zip"
          Compress-Archive -Path dist/bonzi-onedir, README.md -DestinationPath "bonzi-${{ matrix.name }}-onedir.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bonzi-${{ matrix.name }}
          path: |
             bonzi-${{ matrix.name }}.tar.gz
             bonzi-${{ matrix.name }}.zip
             bonzi-${{ matrix.name }}-onedir.zip
          if-no-files-found: error

  release:
    name: Publish release
    needs: [prepare-release, build]
    if: needs.prepare-release.outputs.tag != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create release and upload archives
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare-release.outputs.tag }}
          TARGET: ${{ needs.prepare-release.outputs.ref }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" artifacts/* --clobber
          else
            gh release create "$TAG" artifacts/* --target "$TARGET" --generate-notes
          fi
